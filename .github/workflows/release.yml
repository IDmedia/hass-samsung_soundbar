name: Create Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Log release details without creating the release'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/samsung_soundbar/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        if: ${{ !inputs.dry_run }}
        id: tag_check
        run: |
          if git ls-remote --tags origin "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if tag already exists
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "Tag v${{ steps.version.outputs.version }} already exists. Bump the version before releasing."
          exit 1

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Match header by string prefix to avoid regex dot-escaping issues
          NOTES=$(awk -v ver="## $VERSION " 'index($0,ver)==1{found=1;next} found && /^## /{exit} found{print}' CHANGELOG.md \
            | sed '/./,$!d' \
            | sed -e :a -e '/^[[:space:]]*$/{$d;N;ba}')
          if [ -z "$NOTES" ]; then
            echo "No changelog entry found for version $VERSION"
            exit 1
          fi
          {
            echo "notes<<__EOF__"
            echo "$NOTES"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Log release details (dry run)
        if: inputs.dry_run
        run: |
          echo "tag_name: v${{ steps.version.outputs.version }}"
          echo "name: v${{ steps.version.outputs.version }}"
          echo "body:"
          echo "${{ steps.notes.outputs.notes }}"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
